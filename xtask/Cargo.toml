[package]
name = "xtask"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
serde_json = "1"
# Must pin the SAME tag as ../Cargo.toml: the kind_rs_is_fresh/field_rs_is_fresh
# guards regenerate from THIS dep's node-types.json and diff against files
# generated from the crate's dep — a skew silently disarms them (#48). Enforced
# by the grammar_pins_match test.
tree-sitter-m1 = { git = "https://github.com/C-Nucifora/tree-sitter-m1.git", tag = "v0.7.1" }
