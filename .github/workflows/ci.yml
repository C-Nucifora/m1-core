name: CI

on:
  push:
    branches: [main, features/**]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel superseded runs of the same branch/PR: every push otherwise queues a
# full duplicate job matrix (m1-tools#27).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for the whole workflow; jobs opt into more as needed.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --verbose

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # audit-check posts results as a check run
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Keep in sync with `rust-version` in Cargo.toml (m1-tools#23).
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  # The README install snippet pins a versioned git tag; it silently rotted two
  # minor versions behind Cargo.toml (m1-core#65). Fail CI when the README's
  # pinned tag no longer matches the crate version so it can't drift again.
  readme-tag:
    name: README tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: README pinned tag matches Cargo.toml version
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          readme_tag=$(grep -m1 -oE 'tag = "v[0-9]+\.[0-9]+\.[0-9]+"' README.md | sed -E 's/.*"v(.*)".*/\1/')
          echo "Cargo.toml version: $version"
          echo "README pinned tag:  v$readme_tag"
          if [ "$version" != "$readme_tag" ]; then
            echo "::error file=README.md::README install snippet pins v$readme_tag but Cargo.toml is $version — bump the README tag."
            exit 1
          fi
